<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delta · 卡密提取</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            background: #0b0f14;
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        /* 全屏水印层 —— 小梦制作 */
        body::before {
            content: "小梦制作";
            position: fixed;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            display: block;
            pointer-events: none;
            z-index: 0;
            opacity: 0.07;
            color: #ffffff;
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 6px;
            transform: rotate(-25deg);
            white-space: pre;
            text-shadow: 0 0 3px rgba(0,0,0,0.3);
            background-image: repeating-linear-gradient(
                45deg,
                transparent 0px,
                transparent 80px,
                rgba(255,255,255,0.1) 80px,
                rgba(255,255,255,0.1) 160px
            );
        }

        body::after {
            content: "小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作  小梦制作";
            position: fixed;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            display: block;
            pointer-events: none;
            z-index: 0;
            opacity: 0.06;
            color: #ffffff;
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 8px;
            transform: rotate(-25deg);
            white-space: pre-wrap;
            word-break: break-all;
            text-shadow: 0 0 5px rgba(0,0,0,0.2);
        }

        h2, .card, .info {
            position: relative;
            z-index: 1;
        }

        h2 { color: #00bcd4; font-weight: 400; text-align: center; margin-bottom: 24px; letter-spacing: 2px; }
        .card {
            background: #1a1f26;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        textarea {
            width: 100%;
            height: 100px;
            background: #0f1419;
            border: 1px solid #2a3b47;
            border-radius: 16px;
            color: #fff;
            padding: 14px 16px;
            font-size: 14px;
            font-family: monospace;
            resize: vertical;
            outline: none;
            transition: border 0.2s;
            margin-bottom: 16px;
        }
        textarea:focus { border-color: #00bcd4; }
        .btn-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            margin-bottom: 16px;
        }
        button {
            background: #00bcd4;
            color: #000;
            font-weight: bold;
            font-size: 18px;
            padding: 16px 24px;
            border: none;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 12px rgba(0,188,212,0.3);
            position: relative;
            z-index: 1;
        }
        button:active { background: #00acc1; }
        button:disabled { opacity: 0.5; pointer-events: none; }
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0);
            animation: ripple-animation 0.6s ease-out;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes ripple-animation {
            to { transform: scale(4); opacity: 0; }
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,188,212,0.3);
            border-radius: 50%;
            border-top-color: #00bcd4;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .result-box {
            background: #0f1419;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #2a3b47;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .label { color: #aaa; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .key-value {
            font-family: 'Courier New', monospace;
            font-size: 18px;
            font-weight: bold;
            color: #4caf50;
            word-break: break-all;
            background: #050a0f;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #2c3e3f;
            margin-bottom: 10px;
            transition: all 0.2s;
        }
        .copy-btn {
            background: #2c3e4c;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.1s;
        }
        .copy-btn:active { background: #1e2e3b; }
        .error { 
            color: #ff7b7b; 
            background: #2a1212; 
            padding: 12px; 
            border-radius: 10px; 
            animation: fadeIn 0.2s;
        }
        .waiting-text {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #00bcd4;
            font-size: 16px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c3e4c;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            animation: fadeIn 0.2s;
            z-index: 1000;
        }
        .copyright {
            text-align: center;
            margin-top: 16px;
            color: #5a6a7a;
            font-size: 12px;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

<h2>🔓 DELTA · 卡密提取</h2>

<div class="card">
    <textarea id="urlInput" placeholder="粘贴 auth.platorelay.com 或 gateway.platoboost.com 链接"></textarea>

    <div class="btn-wrapper" id="btnWrapper">
        <button id="extractBtn">✨ 立即提取卡密</button>
    </div>

    <div id="resultContainer" class="result-box" style="display: none;">
        <div class="label">你的卡密</div>
        <div id="keyDisplay" class="key-value"></div>
        <button class="copy-btn" id="copyBtn">📋 复制卡密</button>
    </div>

    <div id="errorContainer" class="error" style="display: none;"></div>
    
    <div id="waitingContainer" style="display: none;" class="waiting-text">
        <span class="loading-spinner"></span> 正在提取卡密，请稍候...
    </div>
</div>

<div class="copyright">by.小梦</div>

<script>
    (function() {
        const urlInput = document.getElementById('urlInput');
        const extractBtn = document.getElementById('extractBtn');
        const btnWrapper = document.getElementById('btnWrapper');
        const resultContainer = document.getElementById('resultContainer');
        const keyDisplay = document.getElementById('keyDisplay');
        const copyBtn = document.getElementById('copyBtn');
        const errorContainer = document.getElementById('errorContainer');
        const waitingContainer = document.getElementById('waitingContainer');

        const BYPASS_API = 'https://api-bypassers.onrender.com/api/bypass';
        const API_KEY = 'freeApikey';

        function createRipple(event) {
            const button = event.currentTarget;
            const rect = button.getBoundingClientRect();
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (event.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (event.clientY - rect.top - size / 2) + 'px';
            btnWrapper.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        extractBtn.addEventListener('click', createRipple);

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function showError(msg) {
            errorContainer.style.display = 'block';
            errorContainer.textContent = '❌ ' + msg;
            resultContainer.style.display = 'none';
            waitingContainer.style.display = 'none';
        }

        function showKey(key) {
            keyDisplay.textContent = key;
            resultContainer.style.display = 'block';
            errorContainer.style.display = 'none';
            waitingContainer.style.display = 'none';
        }

        copyBtn.addEventListener('click', () => {
            const key = keyDisplay.textContent;
            if (!key) return;
            navigator.clipboard?.writeText(key).then(() => {
                showToast('卡密已复制');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = key;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('卡密已复制');
            });
        });

        extractBtn.addEventListener('click', async () => {
            const fullUrl = urlInput.value.trim();
            if (!fullUrl) {
                showError('请输入链接');
                return;
            }

            let ticket = null;
            let isAuthLink = false;

            if (fullUrl.includes('auth.platorelay.com/a?d=')) {
                try {
                    const urlObj = new URL(fullUrl);
                    ticket = urlObj.searchParams.get('d');
                    isAuthLink = true;
                } catch (e) {
                    showError('链接格式错误');
                    return;
                }
            } else if (fullUrl.includes('gateway.platoboost.com/a/8?id=')) {
                try {
                    const urlObj = new URL(fullUrl);
                    ticket = urlObj.searchParams.get('id');
                    isAuthLink = false;
                } catch (e) {
                    showError('链接格式错误');
                    return;
                }
            } else {
                showError('不支持的链接格式');
                return;
            }

            if (!ticket) {
                showError('无法提取必要参数');
                return;
            }

            extractBtn.disabled = true;
            extractBtn.innerHTML = '<span class="loading-spinner" style="display:inline-block; vertical-align:middle;"></span> 提取中...';
            errorContainer.style.display = 'none';
            resultContainer.style.display = 'none';
            waitingContainer.style.display = 'flex';

            try {
                let key = null;

                if (isAuthLink) {
                    const keyResp = await fetch(`https://auth.platorelay.com/api/session/status?ticket=${encodeURIComponent(ticket)}`, {
                        headers: { 'Accept': 'application/json' }
                    });
                    const keyData = await keyResp.json();
                    if (keyData.success && keyData.data && keyData.data.key) {
                        key = keyData.data.key;
                    } else {
                        throw new Error('卡密尚未生成，请确认已观看广告或稍后重试');
                    }
                } else {
                    const platoboostUrl = `https://gateway.platoboost.com/a/8?id=${ticket}`;
                    
                    const bypassResp = await fetch(BYPASS_API, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-API-Key': API_KEY
                        },
                        body: JSON.stringify({ url: platoboostUrl })
                    });

                    const bypassData = await bypassResp.json();
                    if (!bypassData.success || !bypassData.result) {
                        throw new Error('BypassMidd 未返回有效链接');
                    }

                    const bypassedUrl = bypassData.result.replace(/\\\//g, '/');
                    const dMatch = bypassedUrl.match(/[?&]d=([a-zA-Z0-9]+)/);
                    if (!dMatch) throw new Error('无法提取 d 参数');
                    const dTicket = dMatch[1];

                    const keyResp = await fetch(`https://auth.platorelay.com/api/session/status?ticket=${encodeURIComponent(dTicket)}`, {
                        headers: { 'Accept': 'application/json' }
                    });
                    const keyData = await keyResp.json();
                    if (keyData.success && keyData.data && keyData.data.key) {
                        key = keyData.data.key;
                    } else {
                        throw new Error('卡密生成中，请1分钟后重试');
                    }
                }

                showKey(key);
            } catch (err) {
                showError(err.message);
            } finally {
                extractBtn.disabled = false;
                extractBtn.innerHTML = '✨ 立即提取卡密';
            }
        });

        // 自动读取URL参数填入输入框
        const urlParams = new URLSearchParams(window.location.search);
        const autoUrl = urlParams.get('url');
        if (autoUrl) {
            urlInput.value = autoUrl;
        }
    })();
</script>
</body>
</html>
